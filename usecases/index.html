<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Use Case Picker | CoLab Lisbon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral: #E8503A;
            --lime: #C9E548;
            --charcoal: #3A3A3A;
            --salmon: #F5A899;
            --light-bg: #FFF9F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light-bg);
            color: var(--charcoal);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background shapes */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--coral);
            top: -100px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--lime);
            bottom: -50px;
            left: -50px;
            animation: float2 25s ease-in-out infinite;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: var(--salmon);
            top: 50%;
            left: 50%;
            animation: float3 15s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-50px, 50px) rotate(180deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, -50px) rotate(-180deg); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: var(--coral);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--charcoal);
            opacity: 0.8;
        }

        /* Filter Section */
        .filters {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(232, 80, 58, 0.1);
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
            color: var(--charcoal);
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--charcoal);
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--salmon);
            border-color: var(--coral);
        }

        .filter-btn.active {
            background: var(--coral);
            border-color: var(--coral);
            color: white;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--coral);
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .result-count {
            font-weight: 700;
            color: var(--coral);
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            padding: 8px 12px;
            border: none;
            background: #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: var(--lime);
        }

        /* Use Cases Grid */
        .use-cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .use-cases-grid.list-view {
            grid-template-columns: 1fr;
        }

        .use-case-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .use-case-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(232, 80, 58, 0.15);
            border-left-color: var(--coral);
        }

        .use-case-card.saved {
            border-left-color: var(--lime);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            color: var(--coral);
            opacity: 0.6;
        }

        .card-category {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: var(--salmon);
            color: var(--charcoal);
            border-radius: 15px;
            font-weight: 500;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 15px;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: #f5f5f5;
            border-radius: 10px;
            color: #666;
        }

        .tag.difficulty-beginner { background: #e8f5e9; color: #2e7d32; }
        .tag.difficulty-intermediate { background: #fff3e0; color: #ef6c00; }
        .tag.difficulty-advanced { background: #fce4ec; color: #c2185b; }

        .tag.impact-revenue { background: var(--lime); color: var(--charcoal); }
        .tag.impact-cost { background: #e3f2fd; color: #1565c0; }
        .tag.impact-growth { background: var(--salmon); color: var(--charcoal); }

        .save-btn {
            margin-top: 15px;
            padding: 8px 16px;
            border: 2px solid var(--lime);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .save-btn:hover, .save-btn.saved {
            background: var(--lime);
        }

        /* Saved List Panel */
        .saved-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            z-index: 100;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .saved-panel.open {
            right: 0;
        }

        .saved-panel-header {
            padding: 30px;
            background: var(--coral);
            color: white;
            position: sticky;
            top: 0;
        }

        .saved-panel-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .saved-list {
            padding: 20px;
        }

        .saved-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-item-text {
            flex: 1;
            font-size: 0.95rem;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--coral);
            cursor: pointer;
            padding: 5px;
            font-size: 1.2rem;
        }

        .export-btns {
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        .export-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .export-btn.copy {
            background: var(--charcoal);
            color: white;
        }

        .export-btn.download {
            background: var(--lime);
            color: var(--charcoal);
        }

        /* Floating saved counter */
        .saved-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--coral);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(232, 80, 58, 0.3);
            font-weight: 700;
            z-index: 50;
            transition: all 0.3s ease;
        }

        .saved-counter:hover {
            transform: scale(1.05);
        }

        .saved-counter .count {
            background: var(--lime);
            color: var(--charcoal);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
        }

        /* Category sections */
        .category-section {
            margin-bottom: 40px;
        }

        .category-header {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--coral);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--lime);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-count {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: var(--salmon);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .use-cases-grid {
                grid-template-columns: 1fr;
            }

            .saved-panel {
                width: 100%;
                right: -100%;
            }

            .filter-row {
                flex-direction: column;
            }
        }

        /* Quick filters */
        .quick-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .quick-filter {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--coral), var(--salmon));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .quick-filter:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(232, 80, 58, 0.3);
        }

        .quick-filter.green {
            background: linear-gradient(135deg, var(--lime), #9BC736);
            color: var(--charcoal);
        }
    </style>
</head>

                    <span class="filter-label">Difficulty</span>
                    <div class="filter-buttons">

                        <button class="filter-btn" data-filter="difficulty" data-value="beginner">Beginner</button>
                        <button class="filter-btn" data-filter="difficulty" data-value="intermediate">Intermediate</button>
                        <button class="filter-btn" data-filter="difficulty" data-value="advanced">Advanced</button>

                <div class="filter-group">

                    <div class="filter-buttons">

                        <button class="filter-btn" data-filter="impact" data-value="revenue">💰 Revenue</button>
                        <button class="filter-btn" data-filter="impact" data-value="cost">📉 Cost Saving</button>
                        <button class="filter-btn" data-filter="impact" data-value="growth">🚀 Growth</button>

            </div>

            <div class="quick-filters">

        </div>

        <div class="stats-bar">
            <span class="result-count"><span id="resultCount">455</span> use cases</span>
            <div class="view-toggle">
                <button class="view-btn active" onclick="setView('grid')" title="Grid view">▦</button>
                <button class="view-btn" onclick="setView('list')" title="List view">☰</button>
            </div>
        </div>

        <div class="use-cases-grid" id="useCasesGrid">
            <!-- Cards generated by JavaScript -->
        </div>
    </div>

    <!-- Floating saved counter -->
    <div class="saved-counter" id="savedCounter" onclick="toggleSavedPanel()">
        📋 Saved <span class="count" id="savedCount">0</span>
    </div>

    <!-- Saved panel -->
    <div class="saved-panel" id="savedPanel">
        <div class="saved-panel-header">
            <h2>Your Saved Use Cases</h2>
            <button class="close-panel" onclick="toggleSavedPanel()">×</button>
        </div>
        <div class="saved-list" id="savedList">
            <div class="empty-state">

            </div>
        </div>
        <div class="export-btns">

        // State
        let savedUseCases = JSON.parse(localStorage.getItem('savedUseCases') || '[]');
        let currentFilters = {
            difficulty: 'all',
            impact: 'all',
            search: ''
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderUseCases();
            updateSavedCount();
            setupFilterListeners();
        });

        function setupFilterListeners() {
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const filter = e.target.dataset.filter;
                    const value = e.target.dataset.value;

                    // Update active state
                    document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    currentFilters[filter] = value;
                    renderUseCases();
                });
            });

            // Search box
            document.getElementById('searchBox').addEventListener('input', (e) => {
                currentFilters.search = e.target.value.toLowerCase();
                renderUseCases();
            });
        }

        function filterUseCases() {
            return useCases.filter(uc => {
                // Difficulty filter
                if (currentFilters.difficulty !== 'all' && uc.difficulty !== currentFilters.difficulty) {
                    return false;
                }

                // Impact filter
                if (currentFilters.impact !== 'all' && uc.impact !== currentFilters.impact) {
                    return false;
                }

                // Search filter
                if (currentFilters.search) {
                    const searchText = currentFilters.search;
                    const matchTitle = uc.title.toLowerCase().includes(searchText);
                    const matchCategory = uc.category.toLowerCase().includes(searchText);
                    const matchTags = uc.tags.some(tag => tag.includes(searchText));
                    if (!matchTitle && !matchCategory && !matchTags) {
                        return false;
                    }
                }

                return true;
            });
        }

        function renderUseCases() {
            const filtered = filterUseCases();
            const grid = document.getElementById('useCasesGrid');

            document.getElementById('resultCount').textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>No use cases found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                return;
            }

            // Group by category
            const grouped = {};
            filtered.forEach(uc => {
                const cat = uc.category;
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(uc);
            });

            let html = '';
            Object.keys(grouped).forEach(category => {
                html += `
                    <div class="category-section" style="grid-column: 1/-1;">
                        <h2 class="category-header">
                            ${getCategoryEmoji(category)} ${category}
                            <span class="category-count">${grouped[category].length}</span>
                        </h2>
                        <div class="use-cases-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;">
                            ${grouped[category].map(uc => renderCard(uc)).join('')}
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        function getCategoryEmoji(category) {
            const emojis = {
                'Content & Marketing': '📝',
                'Customer & Sales': '💬',
                'Operations & Automation': '⚙️',
                'Data & Analytics': '📊',
                'Decision Making & Strategy': '🧠',
                'Internal Systems & Documentation': '📋',
                'Product & Development': '🛠️',
                'Industry-Specific: E-commerce': '🛒',
                'Industry-Specific: SaaS': '☁️',
                'Industry-Specific: Consulting': '💼',
                'Industry-Specific: Education': '🎓',
                'Industry-Specific: Real Estate': '🏠',
                'Industry-Specific: Healthcare': '🏥',
                'Advanced & Emerging': '🚀',
                'High-Intent Lead Capture': '💰',
                'Sales Velocity & Closing': '📈',
                'Retention & Expansion': '💎',
                'Operational Leverage': '⚙️',
                'Direct Revenue Channels': '🚀'
            };
            return emojis[category] || '📌';
        }

        function renderCard(uc) {
            const isSaved = savedUseCases.includes(uc.id);
            return `
                <div class="use-case-card ${isSaved ? 'saved' : ''}" data-id="${uc.id}">
                    <div class="card-header">
                        <span class="card-number">#${uc.id}</span>
                        <span class="card-category">${uc.category.split(':')[0]}</span>
                    </div>
                    <h3 class="card-title">${uc.title}</h3>
                    <div class="card-tags">
                        <span class="tag difficulty-${uc.difficulty}">${uc.difficulty}</span>
                        <span class="tag impact-${uc.impact}">${getImpactLabel(uc.impact)}</span>
                        ${uc.tags.slice(0, 2).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${uc.id})">
                        ${isSaved ? '✓ Saved' : '+ Save'}
                    </button>
                </div>
            `;
        }

        function getImpactLabel(impact) {
            const labels = {
                'revenue': '💰 Revenue',
                'cost': '📉 Cost Saving',
                'growth': '🚀 Growth'
            };
            return labels[impact] || impact;
        }

        function toggleSave(id) {
            const index = savedUseCases.indexOf(id);
            if (index > -1) {
                savedUseCases.splice(index, 1);
            } else {
                savedUseCases.push(id);
            }
            localStorage.setItem('savedUseCases', JSON.stringify(savedUseCases));
            updateSavedCount();
            renderUseCases();
            renderSavedList();
        }

        function updateSavedCount() {
            document.getElementById('savedCount').textContent = savedUseCases.length;
        }

        function toggleSavedPanel() {
            document.getElementById('savedPanel').classList.toggle('open');
            renderSavedList();
        }

        function renderSavedList() {
            const list = document.getElementById('savedList');
            if (savedUseCases.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h3>No saved items yet</h3>
                        <p>Click "Save" on any use case to add it here</p>
                    </div>
                `;
                return;
            }

            const savedItems = savedUseCases.map(id => useCases.find(uc => uc.id === id)).filter(Boolean);
            list.innerHTML = savedItems.map(uc => `
                <div class="saved-item">
                    <span class="saved-item-text">${uc.id}. ${uc.title}</span>
                    <button class="remove-btn" onclick="toggleSave(${uc.id})">×</button>
                </div>
            `).join('');
        }

        function setView(view) {
            const grid = document.getElementById('useCasesGrid');
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            if (view === 'list') {
                grid.classList.add('list-view');
                document.querySelectorAll('.view-btn')[1].classList.add('active');
            } else {
                grid.classList.remove('list-view');
                document.querySelectorAll('.view-btn')[0].classList.add('active');
            }
        }

        function filterQuick(type) {
            // Reset filters
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('[data-value="all"]').forEach(btn => btn.classList.add('active'));
            currentFilters.difficulty = 'all';
            currentFilters.impact = 'all';

            switch(type) {
                case 'quick-wins':
                    document.querySelector('[data-value="beginner"]').click();
                    break;
                case 'money-makers':
                    document.querySelector('[data-value="revenue"]').click();
                    break;
                case 'automation':
                    document.getElementById('searchBox').value = 'automation';
                    currentFilters.search = 'automation';
                    break;
                case 'sales':
                    document.getElementById('searchBox').value = 'sales crm';
                    currentFilters.search = 'sales';
                    break;
                case 'content':
                    document.getElementById('searchBox').value = 'content';
                    currentFilters.search = 'content';
                    break;
            }
            renderUseCases();
        }

        function copyToClipboard() {
            const savedItems = savedUseCases.map(id => useCases.find(uc => uc.id === id)).filter(Boolean);
            const text = savedItems.map(uc => `${uc.id}. ${uc.title} (${uc.category})`).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function downloadList() {
            const savedItems = savedUseCases.map(id => useCases.find(uc => uc.id === id)).filter(Boolean);
            let text = "# My AI Use Case Priorities\n\n";
            text += `Generated: ${new Date().toLocaleDateString()}\n\n`;

            savedItems.forEach((uc, i) => {
                text += `## ${i + 1}. ${uc.title}\n`;
                text += `- **Category:** ${uc.category}\n`;
                text += `- **Difficulty:** ${uc.difficulty}\n`;
                text += `- **Impact:** ${uc.impact}\n`;
                text += `- **Tags:** ${uc.tags.join(', ')}\n\n`;
            });

            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my-ai-use-cases.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
